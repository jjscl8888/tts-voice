<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>发音评测 - TTS Voice</title>
  <link rel="stylesheet" href="/css/speech.css">
</head>
<body>
  <nav class="app-nav">
    <a href="/">🔊 语音合成</a>
    <a href="/speech.html" class="active">🎙️ 发音评测</a>
  </nav>

  <div class="container">
    <header>
      <h1>🎙️ 发音评测</h1>
      <p class="subtitle">输入文字，朗读并获取评分</p>
    </header>

    <section class="input-section">
      <div class="form-group">
        <label for="languageSelect">选择语言类型</label>
        <select id="languageSelect">
          <option value="zh">中文（汉字）</option>
          <option value="pinyin">拼音</option>
          <option value="en">英语</option>
        </select>
      </div>

      <div class="form-group">
        <label for="textInput">请输入要朗读的内容</label>
        <textarea id="textInput" rows="3" placeholder="例如：你好世界 / ni3 hao3 shi4 jie4 / Hello World"></textarea>
        <div class="hint" id="inputHint">请输入中文汉字</div>
      </div>

      <div class="examples">
        <span>示例：</span>
        <button type="button" class="example-btn" data-text="你好世界" data-lang="zh">你好世界</button>
        <button type="button" class="example-btn" data-text="ni3 hao3 shi4 jie4" data-lang="pinyin">nǐ hǎo shì jiè</button>
        <button type="button" class="example-btn" data-text="Hello World" data-lang="en">Hello World</button>
        <button type="button" class="example-btn" data-text="春眠不觉晓" data-lang="zh">春眠不觉晓</button>
        <button type="button" class="example-btn" data-text="The quick brown fox" data-lang="en">The quick brown fox</button>
      </div>
    </section>

    <section class="record-section">
      <div class="record-controls">
        <button type="button" id="recordBtn" class="btn btn-record" disabled>
          <span>🎤</span>
          <span>开始录音</span>
        </button>
        <button type="button" id="stopBtn" class="btn btn-stop" disabled>
          <span>⏹️</span>
          <span>停止录音</span>
        </button>
      </div>

      <div id="recordingStatus" class="recording-status hidden">
        <div class="pulse-dot"></div>
        <span>录音中... <span id="recordTime">0</span>秒</span>
      </div>

      <canvas id="waveform" width="600" height="80" class="hidden"></canvas>
    </section>

    <section id="playbackSection" class="playback-section hidden">
      <h3>📼 录音回放</h3>
      <div class="audio-player">
        <audio id="audioPlayer" controls></audio>
        <button type="button" id="reRecordBtn" class="btn btn-secondary">重新录音</button>
        <button type="button" id="submitBtn" class="btn btn-primary">提交评测</button>
      </div>
    </section>

    <section id="resultSection" class="result-section hidden">
      <h3>📊 评测结果</h3>

      <div id="loading" class="loading hidden">
        <div class="spinner"></div>
        <p>正在评测中，请稍候...</p>
      </div>

      <div id="scoreCard" class="score-card hidden">
        <div class="score-circle">
          <svg viewBox="0 0 100 100">
            <circle class="score-bg" cx="50" cy="50" r="45"/>
            <circle class="score-progress" cx="50" cy="50" r="45" id="scoreCircle"/>
          </svg>
          <div class="score-number" id="overallScore">0</div>
        </div>
        <div class="score-label">综合评分</div>
      </div>

      <div id="subScores" class="sub-scores hidden">
        <div class="sub-score-item">
          <span class="sub-label">准确度</span>
          <div class="progress-bar">
            <div class="progress-fill" id="accuracyBar"></div>
          </div>
          <span class="sub-value" id="accuracyScore">0</span>
        </div>
        <div class="sub-score-item" id="pinyinScoreRow">
          <span class="sub-label">拼音/发音</span>
          <div class="progress-bar">
            <div class="progress-fill" id="pinyinBar"></div>
          </div>
          <span class="sub-value" id="pinyinScore">0</span>
        </div>
      </div>

      <div id="recognizedSection" class="recognized-section hidden">
        <div class="text-compare">
          <div class="compare-item">
            <label>📝 期望文本</label>
            <p id="expectedText" class="expected-text"></p>
          </div>
          <div class="compare-item">
            <label>🎧 识别结果</label>
            <p id="recognizedText" class="recognized-text"></p>
          </div>
        </div>
      </div>

      <div id="detailSection" class="detail-section hidden">
        <h4>逐字/逐词详情</h4>
        <div id="detailGrid" class="detail-grid"></div>
      </div>
    </section>

    <section id="historySection" class="history-section">
      <h3>📋 历史记录</h3>
      <div id="historyList" class="history-list">
        <p class="empty-hint">暂无评测记录</p>
      </div>
    </section>
  </div>

  <script src="/js/speech.js"></script>
</body>
</html>
